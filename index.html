<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta property="og:title" content="أسرة صناع الحياة">
    <meta property="og:description" content="تسجيل الأنشطة (أسرة صناع الحياة)">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/ar/f/f6/%D8%B5%D9%86%D8%A7%D8%B9_%D8%A7%D9%84%D8%AD%D9%8A%D8%A7%D8%A9.png">
    <meta property="og:url" content="https://sites.google.com/view/lifemakersbatran/registration">
    <meta property="og:type" content="website">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الأنشطة الطلابية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --secondary: #7c3aed;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1e293b;
            --text-light: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 80px 20px 40px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .copyright-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(26, 54, 93, 0.95); backdrop-filter: blur(10px);
            color: white; text-align: center; padding: 12px; z-index: 1000;
            font-size: 0.85em; font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .leaders-section {
            display: flex; justify-content: center; gap: 60px;
            margin: 30px 0 40px; flex-wrap: wrap; position: relative; z-index: 1;
        }

        .leader-card { text-align: center; transition: transform 0.3s ease; }
        .leader-card:hover { transform: translateY(-10px); }

        .leader-title {
            color: white; font-weight: 700; margin-bottom: 15px; font-size: 1.1em;
            background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 20px;
            backdrop-filter: blur(10px); display: inline-block;
        }

        .leader-img-container { position: relative; display: inline-block; }
        .leader-img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid white; object-fit: cover; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .leader-name { color: white; font-size: 1.2em; font-weight: 700; margin-top: 15px; }

        .header-title {
            text-align: center; color: white; margin: 50px 0 40px;
            font-size: 2.5em; font-weight: 800; position: relative; z-index: 1;
        }

        .activities-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 1;
        }

        .activity-card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            display: flex; flex-direction: column; transition: all 0.4s ease;
            animation: fadeInUp 0.6s ease forwards; opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .activity-card:hover { transform: translateY(-12px); box-shadow: var(--shadow-hover); }

        .activity-img { width: 100%; height: 200px; object-fit: cover; }

        .card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }

        .status-tag {
            font-size: 0.8em; padding: 8px 18px; border-radius: 50px;
            font-weight: 700; align-self: flex-start; margin-bottom: 15px;
            display: flex; align-items: center; gap: 8px;
        }

        .status-tag.open { background: #d1fae5; color: #065f46; }
        .status-tag.closed { background: #fee2e2; color: #991b1b; }

        .countdown-timer {
            background: #fef3c7; border: 2px solid var(--accent-light);
            color: var(--primary); padding: 12px; border-radius: 12px;
            text-align: center; margin-bottom: 20px; font-weight: 700;
        }

        .meta-info {
            font-size: 0.95em; margin-bottom: 12px; display: flex;
            align-items: center; gap: 12px; padding: 8px 12px;
            background: #f8fafc; border-radius: 10px;
        }

        .btn-reg {
            display: block; text-align: center; background: var(--primary);
            color: white; padding: 15px; border-radius: 12px;
            text-decoration: none; font-weight: 700; transition: all 0.3s;
        }

        .btn-reg:hover { background: var(--accent); transform: translateY(-3px); }
        .btn-reg.disabled { background: #9ca3af !important; pointer-events: none; }

        .archive-container { max-width: 1400px; margin: 40px auto; width: 100%; z-index: 1; position: relative; }
        .accordion-btn {
            width: 100%; background: rgba(255,255,255,0.15); color: white; padding: 15px;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; cursor: pointer;
            font-size: 1.2em; font-family: 'Tajawal'; font-weight: bold; display: flex;
            justify-content: space-between; align-items: center; backdrop-filter: blur(5px);
        }
        .accordion-content { display: none; padding-top: 20px; }
        .accordion-content.show { display: grid; }

        /* Delays */
        .activity-card:nth-child(1) { animation-delay: 0.1s; }
        .activity-card:nth-child(2) { animation-delay: 0.2s; }
        .activity-card:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body>

    <div class="copyright-bar">
        <i class="fas fa-code"></i> Copyright © 2026 - Developed by Ahmed Mohalhal (◔◡◔)
    </div>
    
    <div class="leaders-section">
        <div class="leader-card">
            <div class="leader-title">رائد الأسرة</div>
            <div class="leader-img-container"><img src="رائد الأسرة.jpeg" class="leader-img"></div>
            <div class="leader-name">يوسف هاني</div>
        </div>
        <div class="leader-card">
            <div class="leader-title">الأمين المساعد</div>
            <div class="leader-img-container"><img src="الأمين المساعد.jpeg" class="leader-img"></div>
            <div class="leader-name">محمد عصام</div>
        </div>
    </div>

    <h1 class="header-title">الأنشطة الطلابية المتاحة</h1>
    <div class="activities-grid" id="activitiesGrid"></div>

    <div class="archive-container" id="archiveSection" style="display:none;">
        <button class="accordion-btn" onclick="document.getElementById('archiveContent').classList.toggle('show')">
            أنشطة سابقة متاح التسجيل بها <span><i class="fas fa-chevron-down"></i></span>
        </button>
        <div class="activities-grid accordion-content" id="archiveContent"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zqmxinxcczxhqcfczzxk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbXhpbnhjY3p4aHFjZmN6enhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyODA2NzEsImV4cCI6MjA4Njg1NjY3MX0.RUMibOBVFGTjGYBgmCRWSfnkqat7vbacJTr1_78PbN8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function startCountdown(activityId, endTime) {
            const countdownElement = document.getElementById(`timer-${activityId}`);
            if (!countdownElement) return; 

            const targetTime = new Date(endTime).getTime();
            const interval = setInterval(() => {
                const now = new Date().getTime();
                const distance = targetTime - now;

                if (distance < 0) {
                    clearInterval(interval);
                    countdownElement.innerHTML = 'انتهى وقت التسجيل';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                
                countdownElement.innerHTML = `<i class="fas fa-clock"></i> ينتهي خلال: ${days} يوم و ${hours} ساعة`;
            }, 1000);
        }

        async function loadActivities() {
            const { data, error } = await _supabase.from('activities').select('*').order('id', { ascending: false });
            if (error) return;

            const grid = document.getElementById('activitiesGrid');
            const archiveContent = document.getElementById('archiveContent');
            const archiveSection = document.getElementById('archiveSection');

            const activeActs = data.filter(a => !a.is_archived);
            const archivedActs = data.filter(a => a.is_archived);

            const renderCard = (act) => {
                const isTimeUp = act.end_time && new Date(act.end_time) < new Date();
                const isOpen = act.is_open && !isTimeUp;
                return `
                <div class="activity-card" style="opacity:1">
                    <img src="${act.image_url || 'https://via.placeholder.com/350x200'}" class="activity-img">
                    <div class="card-content">
                        <span class="status-tag ${isOpen ? 'open' : 'closed'}">
                            ${isOpen ? 'التسجيل مفتوح' : 'التسجيل مغلق'}
                        </span>
                        <h3>${act.title}</h3>
                        ${act.details ? `<p class="details-text">${act.details}</p>` : ''}
                        ${act.end_time && isOpen ? `<div class="countdown-timer" id="timer-${act.id}"></div>` : ''}
                        <div class="meta-info"><i class="fas fa-map-marker-alt"></i> ${act.location || 'نادي المعهد'}</div>
                        <div class="meta-info"><i class="fas fa-calendar-day"></i> ${act.day_date}</div>
                        <a href="${isOpen ? act.reg_link : '#'}" class="btn-reg ${!isOpen ? 'disabled' : ''}">
                            ${isOpen ? 'سجل بياناتك الآن' : 'التسجيل مغلق'}
                        </a>
                    </div>
                </div>`;
            };

            grid.innerHTML = activeActs.length > 0 ? activeActs.map(renderCard).join('') : '<div class="no-activities">لا توجد أنشطة حالية</div>';

            if (archivedActs.length > 0) {
                archiveSection.style.display = 'block';
                archiveContent.innerHTML = archivedActs.map(renderCard).join('');
            }

            data.forEach(act => {
                if (act.end_time && act.is_open && new Date(act.end_time) > new Date()) {
                    startCountdown(act.id, act.end_time);
                }
            });
        }

        loadActivities();
    </script>
</body>
</html>
