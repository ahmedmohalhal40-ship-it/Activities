<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta property="og:title" content="أسرة صناع الحياة">
    <meta property="og:description" content="تسجيل الأنشطة (أسرة صناع الحياة)">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/ar/f/f6/%D8%B5%D9%86%D8%A7%D8%B9_%D8%A7%D9%84%D8%AD%D9%8A%D8%A7%D8%A9.png">
    <meta property="og:url" content="https://sites.google.com/view/lifemakersbatran/registration">
    <meta property="og:type" content="website">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الأنشطة الطلابية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #004e64;
            --accent: #f9a825;
            --bg: #F7F9FC;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg );
            margin: 0;
            padding: 60px 20px 20px 20px;
        }
        .copyright-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 10px 0;
            z-index: 1000;
            font-size: 0.9em;
        }
        .leaders-section {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .leader-card {
            text-align: center;
            flex: 0 1 150px;
        }
        .leader-title {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .leader-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        .leader-name {
            color: #444;
            font-size: 1em;
            font-weight: bold;
        }
        .header-title {
            text-align: center;
            color: var(--primary);
            margin: 40px 0 20px 0;
            font-size: 2em;
        }
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .activity-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
            transition: 0.3s ease;
        }
        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .activity-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eee;
        }
        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .status-tag {
            font-size: 0.75em;
            padding: 4px 12px;
            border-radius: 5px;
            font-weight: bold;
            align-self: flex-start;
            margin-bottom: 10px;
        }
        .open { background: #e8f5e9; color: #2e7d32; }
        .closed { background: #ffebee; color: #c62828; }
        h3 {
            color: var(--primary);
            margin: 0 0 10px 0;
            font-size: 1.3em;
        }
        .details-text {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .meta-info {
            font-size: 0.9em;
            color: #444;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .meta-info i {
            color: var(--accent);
            width: 18px;
            text-align: center;
        }
        .btn-reg {
            display: block;
            text-align: center;
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: auto;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-reg:hover { background: var(--accent); }
        .disabled { background: #ccc !important; pointer-events: none; }
        
        .countdown-timer {
            background-color: #fff4e3;
            border: 1px solid var(--accent);
            color: var(--primary);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .countdown-timer i {
            margin-left: 8px;
        }

        @media (max-width: 500px) {
            .activities-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="copyright-bar">Copyright © 2025 - Developed by Ahmed Mohalhal</div>
    
    <div class="leaders-section">
        <div class="leader-card">
            <div class="leader-title">رائد الأسرة</div>
            <img src="رائد الأسرة.jpeg" alt="رائد الأسرة" class="leader-img">
            <div class="leader-name">يوسف هاني</div>
        </div>

        <div class="leader-card">
            <div class="leader-title">الأمين المساعد</div>
            <img src="الأمين المساعد.jpeg" alt="الأمين المساعد" class="leader-img">
            <div class="leader-name">محمد عصام</div>
        </div>
    </div>

    <h1 class="header-title">الأنشطة الطلابية المتاحة</h1>

    <div class="activities-grid" id="activitiesGrid"></div>

    <script>
        const SUPABASE_URL = 'https://zqmxinxcczxhqcfczzxk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbXhpbnhjY3p4aHFjZmN6enhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyODA2NzEsImV4cCI6MjA4Njg1NjY3MX0.RUMibOBVFGTjGYBgmCRWSfnkqat7vbacJTr1_78PbN8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY );

        function startCountdown(activityId, endTime) {
            const countdownElement = document.getElementById(`timer-${activityId}`);
            if (!countdownElement) return; 

            const statusElement = document.getElementById(`status-${activityId}`);
            const buttonElement = document.getElementById(`button-${activityId}`);
            const targetTime = new Date(endTime).getTime();

            const interval = setInterval(() => {
                const now = new Date().getTime();
                const distance = targetTime - now;

                if (distance < 0) {
                    clearInterval(interval);
                    countdownElement.innerHTML = "انتهى وقت التسجيل";
                    if (statusElement) {
                        statusElement.textContent = '● التسجيل مغلق';
                        statusElement.className = 'status-tag closed';
                    }
                    if (buttonElement) {
                        buttonElement.textContent = 'عذراً، التسجيل مغلق';
                        buttonElement.classList.add('disabled');
                        buttonElement.href = '#';
                    }
                    // Update the database only if it's currently open
                    _supabase.from('activities').select('is_open').eq('id', activityId).single().then(({data}) => {
                        if(data && data.is_open) {
                            _supabase.from('activities').update({ is_open: false }).eq('id', activityId).then();
                        }
                    });
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                let timerText = "ينتهي التسجيل خلال: ";
                if (days > 0) timerText += `${days} يوم و ${hours} ساعة`;
                else if (hours > 0) timerText += `${hours} ساعة و ${minutes} دقيقة`;
                else timerText += `${minutes} دقيقة و ${seconds} ثانية`;
                
                countdownElement.innerHTML = `<i class="fas fa-hourglass-half"></i> ${timerText}`;
            }, 1000);
        }

        async function loadActivities() {
            console.log("بدء تحميل الأنشطة...");
            const { data, error } = await _supabase
                .from('activities')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error("خطأ في جلب البيانات:", error);
                return;
            }

            // **هذا السطر مهم جداً للتشخيص**
            console.log("البيانات التي تم جلبها من Supabase:", data); 

            const grid = document.getElementById('activitiesGrid');
            if (data && data.length > 0) {
                grid.innerHTML = data.map(act => {
                    const isTimeUp = act.end_time && new Date(act.end_time) < new Date();
                    const isOpen = act.is_open && !isTimeUp;

                    return `
                    <div class="activity-card" id="card-${act.id}">
                        <img src="${act.image_url || 'https://via.placeholder.com/350x200?text=No+Image'}" class="activity-img">
                        <div class="card-content">
                            <span id="status-${act.id}" class="status-tag ${isOpen ? 'open' : 'closed'}">
                                ${isOpen ? '● التسجيل مفتوح' : '● التسجيل مغلق'}
                            </span>
                            <h3>${act.title}</h3>
                            ${act.details ? `<p class="details-text">${act.details}</p>` : ''}
                            
                            ${act.end_time && isOpen ? `<div class="countdown-timer" id="timer-${act.id}"></div>` : ''}

                            <div class="meta-info">
                                <i class="fas fa-map-marker-alt"></i> 
                                <span>المكان: ${act.location || 'نادي المعهد'}</span>
                                ${act.map_link ? `
                                    <a href="${act.map_link}" target="_blank" style="color: var(--accent); margin-right: 10px; text-decoration: none;">
                                        <i class="fas fa-location-arrow"></i> فتح الخريطة
                                    </a>
                                ` : ''}
                            </div>
                            <div class="meta-info">
                                <i class="fas fa-calendar-day"></i> 
                                <span>اليوم: ${act.day_date}</span>
                            </div>
                            <div class="meta-info">
                                <i class="fas fa-clock"></i> 
                                <span>الساعة: ${act.activity_time || '--'}</span>
                            </div>

                            <a id="button-${act.id}" href="${isOpen ? act.reg_link : '#'}" 
                               class="btn-reg ${!isOpen ? 'disabled' : ''}">
                               ${isOpen ? 'سجل بياناتك الآن' : 'عذراً، التسجيل مغلق'}
                            </a>
                        </div>
                    </div>
                    `;
                } ).join('');

                data.forEach(act => {
                    // **سطر تشخيصي آخر**
                    console.log(`النشاط: "${act.title}", وقت الانتهاء: ${act.end_time}`);
                    if (act.end_time && act.is_open && new Date(act.end_time) > new Date()) {
                        console.log(`--> بدء العداد للنشاط: "${act.title}"`);
                        startCountdown(act.id, act.end_time);
                    }
                });

            } else {
                grid.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>لا توجد أنشطة متاحة حالياً.</p>";
            }
        }

        loadActivities();
    </script>
</body>
</html>
